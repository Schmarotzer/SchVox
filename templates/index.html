<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SchVoice v0.01</title>
    <link rel="stylesheet" href="{{ url_for('send_static', path='style.css') }}">
</head>
<body>
    <div id="app">
        <h1>SchVoice v0.01</h1>
        
        <!-- Вкладки -->
        <div class="tabs">
            <button class="tab-button active" data-tab="editor">Редактор</button>
            <button class="tab-button" data-tab="settings">Настройки</button>
            <button class="tab-button" data-tab="log">Журнал</button>
        </div>
        
        <!-- Вкладка Редактор -->
        <div class="tab-content active" id="editor-tab">
            <div class="split-view">
                <div class="left-panel">
                    <h3>Голосовые команды</h3>
                    <div class="command-input">
                        <input type="text" id="command-input" placeholder="Введите голосовую команду...">
                        <button id="add-command-btn">+</button>
                    </div>
                    <ul id="commands-list"></ul>
                </div>
                
                <div class="right-panel">
                    <div class="scenario-controls">
                        <button id="save-scenario-btn" title="Сохранить" disabled>💾</button>
                        <button id="test-scenario-btn" title="Пробный запуск" disabled>▶️</button>
                    </div>
                    
                    <h3>Действия сценария:</h3>
                    <ul id="actions-list"></ul>
                    
                    <div class="action-controls">
                        <select id="action-type-select">
                            <option value="если активна программа">если активна программа</option>
                            <option value="если запущена программа">если запущена программа</option>
                            <option value="открыть файл или программу">открыть файл или программу</option>
                            <option value="закрыть программу">закрыть программу</option>
                            <option value="сказать">сказать</option>
                            <option value="подождать">подождать</option>
                            <option value="нажать клавишу">нажать клавишу</option>
                        </select>
                        <button id="add-action-btn">Добавить действие</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Вкладка Настройки -->
        <div class="tab-content" id="settings-tab">
            <div class="settings-group">
                <h3>Тема</h3>
                <select id="theme-select">
                    <option value="light">Светлая</option>
                    <option value="dark">Тёмная</option>
                </select>
            </div>
            
            <div class="settings-group">
                <h3>Запись голоса</h3>
                <label>
                    Микрофон:
                    <select id="microphone-select"></select>
                </label>
                <label>
                    <input type="checkbox" id="push-to-talk-checkbox"> Запись только при зажатии LCtrl
                </label>
            </div>
            
            <div class="settings-group">
                <h3>Сервисы</h3>
                <label>
                    Распознавание голоса:
                    <select id="stt-service-select">
                        <option value="Google">Google</option>
                    </select>
                </label>
                <label>
                    Произношение текста:
                    <select id="tts-service-select">
                        <option value="Google">Google</option>
                    </select>
                </label>
                <div>
                    <span>Статус распознавания: </span><span id="stt-status">Не проверен</span>
                </div>
                <div>
                    <span>Статус произношения: </span><span id="tts-status">Не проверен</span>
                </div>
                <button id="check-services-btn">Проверить статус сервисов</button>
            </div>
        </div>
        
        <!-- Вкладка Журнал -->
        <div class="tab-content" id="log-tab">
            <h3>Журнал голосовых команд</h3>
            <div id="log-display"></div>
            <button id="clear-log-btn">Очистить журнал</button>
        </div>
    </div>
    
    <!-- Модальное окно для выбора клавиши -->
    <div id="key-selector-modal" class="modal">
        <div class="modal-content">
            <h3>Выберите клавишу</h3>
            <div class="keyboard-layout">
                <div class="row">
                    <button class="key-btn" data-key="Esc">Esc</button>
                    <button class="key-btn" data-key="F1">F1</button>
                    <button class="key-btn" data-key="F2">F2</button>
                    <button class="key-btn" data-key="F3">F3</button>
                    <button class="key-btn" data-key="F4">F4</button>
                    <button class="key-btn" data-key="F5">F5</button>
                    <button class="key-btn" data-key="F6">F6</button>
                    <button class="key-btn" data-key="F7">F7</button>
                    <button class="key-btn" data-key="F8">F8</button>
                    <button class="key-btn" data-key="F9">F9</button>
                    <button class="key-btn" data-key="F10">F10</button>
                    <button class="key-btn" data-key="F11">F11</button>
                    <button class="key-btn" data-key="F12">F12</button>
                </div>
                <div class="row">
                    <button class="key-btn" data-key="`">`</button>
                    <button class="key-btn" data-key="1">1</button>
                    <button class="key-btn" data-key="2">2</button>
                    <button class="key-btn" data-key="3">3</button>
                    <button class="key-btn" data-key="4">4</button>
                    <button class="key-btn" data-key="5">5</button>
                    <button class="key-btn" data-key="6">6</button>
                    <button class="key-btn" data-key="7">7</button>
                    <button class="key-btn" data-key="8">8</button>
                    <button class="key-btn" data-key="9">9</button>
                    <button class="key-btn" data-key="0">0</button>
                    <button class="key-btn" data-key="-">-</button>
                    <button class="key-btn" data-key="=">=</button>
                    <button class="key-btn wide" data-key="Backspace">Backspace</button>
                </div>
                <div class="row">
                    <button class="key-btn wide" data-key="Tab">Tab</button>
                    <button class="key-btn" data-key="Q">Q</button>
                    <button class="key-btn" data-key="W">W</button>
                    <button class="key-btn" data-key="E">E</button>
                    <button class="key-btn" data-key="R">R</button>
                    <button class="key-btn" data-key="T">T</button>
                    <button class="key-btn" data-key="Y">Y</button>
                    <button class="key-btn" data-key="U">U</button>
                    <button class="key-btn" data-key="I">I</button>
                    <button class="key-btn" data-key="O">O</button>
                    <button class="key-btn" data-key="P">P</button>
                    <button class="key-btn" data-key="[">[</button>
                    <button class="key-btn" data-key="]">]</button>
                    <button class="key-btn" data-key="\">\\</button>
                </div>
                <div class="row">
                    <button class="key-btn extra-wide" data-key="Caps Lock">Caps Lock</button>
                    <button class="key-btn" data-key="A">A</button>
                    <button class="key-btn" data-key="S">S</button>
                    <button class="key-btn" data-key="D">D</button>
                    <button class="key-btn" data-key="F">F</button>
                    <button class="key-btn" data-key="G">G</button>
                    <button class="key-btn" data-key="H">H</button>
                    <button class="key-btn" data-key="J">J</button>
                    <button class="key-btn" data-key="K">K</button>
                    <button class="key-btn" data-key="L">L</button>
                    <button class="key-btn" data-key=";">;</button>
                    <button class="key-btn" data-key="'">'</button>
                    <button class="key-btn extra-wide" data-key="Enter">Enter</button>
                </div>
                <div class="row">
                    <button class="key-btn wide" data-key="Shift">Shift</button>
                    <button class="key-btn" data-key="Z">Z</button>
                    <button class="key-btn" data-key="X">X</button>
                    <button class="key-btn" data-key="C">C</button>
                    <button class="key-btn" data-key="V">V</button>
                    <button class="key-btn" data-key="B">B</button>
                    <button class="key-btn" data-key="N">N</button>
                    <button class="key-btn" data-key="M">M</button>
                    <button class="key-btn" data-key=",">,</button>
                    <button class="key-btn" data-key=".">.</button>
                    <button class="key-btn" data-key="/">/</button>
                    <button class="key-btn wide" data-key="Shift">Shift</button>
                </div>
                <div class="row">
                    <button class="key-btn" data-key="Ctrl">Ctrl</button>
                    <button class="key-btn" data-key="Win">Win</button>
                    <button class="key-btn" data-key="Alt">Alt</button>
                    <button class="key-btn space" data-key="Space">Space</button>
                    <button class="key-btn" data-key="Alt">Alt</button>
                    <button class="key-btn" data-key="Win">Win</button>
                    <button class="key-btn" data-key="Menu">Menu</button>
                    <button class="key-btn" data-key="Ctrl">Ctrl</button>
                </div>
            </div>
            <button id="cancel-key-selection">Отмена</button>
        </div>
    </div>
    
    <script src="{{ url_for('send_static', path='script.js') }}"></script>
</body>
</html>
